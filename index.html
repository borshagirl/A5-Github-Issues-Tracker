<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A5 Github Issue</title>
    <!-- fav icon link -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- DaisyUi & Tailwind Link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;  
        }
    </style>

</head>
<body class="bg-gray-100 ">
    <section class="min-h-screen max-w-md mx-auto bg-white space-y-4">
        <div class="logo w-[100px] mx-auto pt-10">
            <img src="assets/github-logo.png" alt="">
        </div>
        <div class="text-center">
            <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <div class="card max-w-sm shrink-0 mx-auto">
            <div class="card-body">
              <fieldset class="fieldset">
                <label class="label text-black text-sm font-medium">Username</label>
                <input type="text" id="input-username" class="input" value="admin" placeholder="Enter Username" />
                <p class="text-[11px] text-[#4a00ff]">Default: admin</p>
                <label class="label  text-black text-sm font-medium">Password</label>
                <input type="password" id="input-password" class="input" placeholder="Enter Password" />
                <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
                 <p class="text-[11px] text-[#4a00ff]">Default: admin123</p>
                <button id="login-btn" class="btn btn-primary w-[322px] mt-4">Sign In</button>
              </fieldset>
            </div>
        </div>

    </section>


    <script src="script/script.js"></script>
</body>
</html>
