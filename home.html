<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Trucker</title>
    <!-- fab icon link -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- DaisyUi & Tailwind Link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;  
        }
    </style>

</head>
<body class="bg-gray-50">
    <!-- navbar -->
    <header class="w-11/12 mx-auto flex justify-between bg-white shadow-sm p-2">
        <div class="flex items-center gap-1">
            <img class="w-6" src="assets/github-logo.png" alt="">
            <h2 class="text-md font-semibold">Github Issue Trucker</h2>
        </div>
        <div class="flex gap-3">
           <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </g>
                </svg>
                <input id="search-issue" type="search" required placeholder="Search Issues..." />
            </label>
            <button onclick="searchNewIssue()" class="btn btn-primary w-32"><span><i class="fa-solid fa-plus"></i></span>New Issue</button>
        </div>
    </header>

    <main class="w-10/12 mx-auto mt-7 mb-4">
        <!-- btn section -->
        <section class="bg-white p-2 shadow-sm">
            <div class="flex items-center gap-2">
                <button onclick="switchTab('all')" id="tab-all" class="btn w-20 h-8">All</button>
                <button onclick="switchTab('open')"  id="tab-open" class="btn h-8">Open</button>
                <button onclick="switchTab('closed')"  id="tab-closed" class="btn h-8">Closed</button>
            </div>  
        </section>

        <!-- manage count issue -->
        <section class="flex justify-between mt-4 bg-white shadow-sm">
            <div class="flex items-center p-4 gap-2">
                <img class="w-10 h-10 bg-[#ddd1f9] p-2 rounded-full" src="assets/Aperture.png" alt="">
                <div>
                    <h2 id="count-issues" class="text-md font-semibold">0 Issues</h2>
                    <p class="w-[250px] text-[12px] text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4 pr-4">
                <div class="flex items-center gap-1">
                    <span class="w-[10px] h-[10px] rounded-full bg-green-600"></span>
                    <span class="text-[12px] font-medium">Open</span>
                </div>

                <div class="flex items-center gap-1">
                    <span class="w-[10px] h-[10px] rounded-full bg-purple-600"></span>
                    <span class="text-[12px] font-medium">Closed</span>
                </div>
            </div>
        </section>

        <!-- Dynamic cards section -->
         <section class="mt-5">
            <div id="issues-container" class="grid grid-cols-2 lg:grid-cols-4 gap-2">
                <!-- <div class="space-y-2 bg-white p-2 shadow-xl">
                    <div class="flex justify-end">
                        <p class="w-20 h-6 text-center rounded-full bg-red-200">High</p>
                    </div>
                    <h2 class="w-[200px] text-md font-semibold">Fix navigation menu on mobile devices</h2>
                    <p class="text-[12px] text-gray-500">The navigation menu doesn't collapse properly on mobile devices</p>
                    <div class="flex items-center gap-2">
                        <h3 class="w-16 h-6 text-center border border-red-600 rounded-full bg-red-200">BUG</h3>
                        <h3 class="w-30 h-6 text-center border border-[#ae8c03] rounded-full bg-[#fde68a]">Help Wanted</h3>
                    </div>
                    <hr class="text-gray-400">
                    <div>
                        <p class="text-[14px] text-gray-500">by john_doe</p>
                        <p class="text-[14px] text-gray-500">1/15/2024</p>
                    </div>
                </div> -->
            </div>
         </section>

        <!-- loading spinner -->
        <section>
             <div id="loading-spinner" class="text-center hidden">
                <span class="loading loading-dots loading-md"></span>
            </div>
        </section>

        <!-- modal section  -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my-modal.showModal()">open modal</button> -->
        <dialog id="my-modal" class="modal">
          <div class="modal-box">
            
            <div class="space-y-2 bg-white p-2 shadow-xl">
                    <div class="flex justify-end">
                        <p id="modal-priority" class="w-20 h-6 text-center rounded-full bg-red-200">High</p>
                    </div>
                    <h2 id="modal-title" class="w-[200px] text-md font-semibold">Fix navigation menu on mobile devices</h2>
                    <p id="modal-description" class="text-[12px] text-gray-500">The navigation menu doesn't collapse properly on mobile devices</p>
                    <div id="modalLabels" class="flex items-center gap-2">
                        
                    </div>
                    <hr id="modal-hr" class="text-gray-400">
                    <div>
                        <p id="modal-author" class="text-[14px] text-gray-500">by john_doe</p>
                        <p id="modal-createdAt" class="text-[14px] text-gray-500">1/15/2024</p>
                    </div>
                </div>
            
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
              </form>
            </div>
          </div>
        </dialog>
        
    </main>

    <script src="script/home.js"></script>
</body>
</html>
